[tool.ruff]
target-version = "py310"
line-length = 100

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "B",    # flake8-bugbear
    "UP",   # pyupgrade
]
ignore = [
    "E501", # line too long (handled by formatter)
    "B008", # function calls in default arguments
]

[tool.ruff.lint.isort]
known-first-party = ["agents", "config", "graph", "tools"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
